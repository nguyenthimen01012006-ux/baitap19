<!DOCTYPE html>

    <title>Memory Card Game</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Memory Card Flip Game</h1>

        </div>

        <div class="card" data-card="A">
            <div class="front">🍎</div>
            <div class="back">?</div>
        </div>

        <div class="card" data-card="B">
            <div class="front">🍌</div>
            <div class="back">?</div>
        </div>

        <div class="card" data-card="B">
            <div class="front">🍌</div>
            <div class="back">?</div>
        </div>

        <div class="card" data-card="C">
            <div class="front">🍇</div>
            <div class="back">?</div>
        </div>

        <div class="card" data-card="C">
            <div class="front">🍇</div>
            <div class="back">?</div>
        </div>

        <div class="card" data-card="D">
            <div class="front">🍒</div>
            <div class="back">?</div>
        </div>

        <div class="card" data-card="D">
            <div class="front">🍒</div>
            <div class="back">?</div>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
